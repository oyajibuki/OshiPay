<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>OshiPay - 転送中です...</title>
  <script>
    const path = window.location.pathname;
    if (path.startsWith('/u/')) {
      const username = path.replace('/u/', '');
      window.location.href = "https://oshipay.streamlit.app/?user=" + encodeURIComponent(username);
    } else {
      window.location.href = "https://oshipay.me/";
    }
  </script>
</head>
<body>
  <p>応援ページへ移動しています...</p>
</body>
</html>
