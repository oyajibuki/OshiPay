<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OshiPay - その感動、今すぐカタチに。</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- カスタムアニメーション設定 -->
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }

    .fade-in-section {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1s ease-out, transform 1s ease-out;
      will-change: opacity, visibility;
    }

    .fade-in-section.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-[#0a0a0f] text-slate-200 selection:bg-purple-500/30 overflow-x-hidden relative">

  <!-- 背景の装飾エフェクト -->
  <div
    class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-5xl h-[500px] bg-gradient-to-b from-purple-900/20 via-orange-900/5 to-transparent blur-3xl pointer-events-none -z-10">
  </div>
  <div class="absolute top-1/4 left-10 w-72 h-72 bg-purple-600/10 rounded-full blur-[100px] pointer-events-none -z-10">
  </div>
  <div
    class="absolute bottom-1/4 right-10 w-96 h-96 bg-orange-600/10 rounded-full blur-[100px] pointer-events-none -z-10">
  </div>

  <!-- ヘッダー -->
  <header class="flex items-center justify-between px-6 py-6 max-w-6xl mx-auto relative z-10">
    <div class="flex items-center gap-2">
      <i data-lucide="flame" class="text-orange-500 w-8 h-8 drop-shadow-[0_0_15px_rgba(249,115,22,0.5)]"></i>
      <span
        class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-purple-500 tracking-tight">
        OshiPay
      </span>
    </div>
    <nav class="hidden md:flex gap-8 text-sm font-medium text-slate-400">
      <a href="javascript:void(0)"
        onclick="document.getElementById('how-it-works').scrollIntoView({behavior: 'smooth'})"
        class="hover:text-white transition-colors">使い方</a>
      <a href="javascript:void(0)" onclick="document.getElementById('usecases').scrollIntoView({behavior: 'smooth'})"
        class="hover:text-white transition-colors">利用シーン</a>
      <a href="javascript:void(0)" onclick="document.getElementById('security').scrollIntoView({behavior: 'smooth'})"
        class="hover:text-white transition-colors">安全性</a>
      <a href="https://oshipay.streamlit.app/?page=dashboard" target="_blank" rel="noopener noreferrer"
        class="px-4 py-2 bg-white/10 rounded-full hover:bg-white/20 transition-all text-white no-underline">
        はじめる
      </a>
    </nav>
  </header>

  <!-- ヒーローセクション -->
  <main class="max-w-7xl mx-auto px-6 pt-16 pb-32 relative z-10 flex flex-col lg:flex-row items-center gap-12">
    <div class="flex-1 text-center lg:text-left">
      <div class="fade-in-section">
        <div
          class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-xs text-purple-300 mb-8 backdrop-blur-sm">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-purple-500"></span>
          </span>
          サービス提供開始
        </div>
      </div>

      <div class="fade-in-section" style="transition-delay: 100ms;">
        <h1 class="text-4xl md:text-7xl lg:text-6xl xl:text-7xl font-extrabold tracking-tight mb-8 leading-[1.15]">
          その感動、<br />
          <span
            class="bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-500 to-orange-400 drop-shadow-sm">
            今すぐカタチに。
          </span>
        </h1>
      </div>

      <div class="fade-in-section" style="transition-delay: 200ms;">
        <p class="text-base md:text-xl text-slate-400 max-w-2xl mx-auto lg:mx-0 mb-12 leading-relaxed font-light">
          アカウントを作ってQRコードを表示するだけ。<br />
  </footer>

  <!-- スクリプト制御 (アイコン初期化・スクロールアニメーション) -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Lucideアイコンのレンダリング
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }

      // スクロール時のフェードインアニメーション処理
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, {
        threshold: 0.1,
        rootMargin: "0px 0px -50px 0px"
      });

      const fadeElements = document.querySelectorAll('.fade-in-section');
      fadeElements.forEach(el => observer.observe(el));

      // 高さをpostMessageでStreamlit親ウィンドウに通知
      const sendHeight = () => {
        const height = document.documentElement.scrollHeight;
        window.parent.postMessage({ type: 'lp_height', height: height }, '*');
      };
      window.addEventListener('load', sendHeight);
      window.addEventListener('resize', sendHeight);
      setTimeout(sendHeight, 300);
      setTimeout(sendHeight, 1500);
      setTimeout(sendHeight, 1500);
    });
  </script>
</body>

</html>
