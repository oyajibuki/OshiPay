<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OshiPay Creator</title>
  <meta name="description" content="Support this creator on OshiPay">
  <link rel="icon" href="https://oyajibuki.github.io/OshiPay/favicon.png?v=2" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; }
    .glow { box-shadow: 0 0 40px rgba(168,85,247,0.35); }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-2deg); }
      50%     { transform: translateY(-10px) rotate(-2deg); }
    }
    .float { animation: float 3.5s ease-in-out infinite; }
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: .6; }
      100% { transform: scale(1.5); opacity: 0;  }
    }
    .pulse-ring {
      position:absolute; inset:0; border-radius:9999px;
      background: rgba(168,85,247,.35);
      animation: pulse-ring 2s ease-out infinite;
    }
  </style>
</head>
<body class="bg-[#0a0a0f] text-slate-200 min-h-screen">

  <!-- BG glow -->
  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-lg h-80 bg-purple-900/20 blur-3xl pointer-events-none"></div>
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-lg h-60 bg-orange-900/10 blur-3xl pointer-events-none"></div>

  <!-- Nav -->
  <div class="flex justify-between items-center px-5 pt-5 pb-2 relative z-10 max-w-sm mx-auto">
    <a href="../index.html" class="flex items-center gap-1.5 opacity-60 hover:opacity-100 transition-opacity">
      <i data-lucide="flame" class="text-orange-500 w-5 h-5"></i>
      <span class="text-sm font-bold text-slate-400">OshiPay</span>
    </a>
    <div class="flex items-center gap-3">
      <a id="edit-btn" href="https://oshipay2jp.streamlit.app/?page=dashboard" class="hidden text-xs text-slate-400 border border-white/10 rounded-full px-3 py-1 hover:bg-white/10 transition-colors">
        ✏️ Edit
      </a>
      <a href="https://oshipay2jp.streamlit.app/?page=ranking" class="text-xs text-amber-400 font-bold flex items-center gap-1 hover:opacity-80 transition-opacity">
        🏆 Rankings
      </a>
    </div>
  </div>

  <!-- Main -->
  <main class="max-w-sm mx-auto px-5 pt-4 pb-24 relative z-10">

    <!-- Profile -->
    <div class="text-center mb-8">
      <!-- Avatar -->
      <div class="relative inline-flex items-center justify-center mb-5">
        <div class="pulse-ring"></div>
        <div class="relative w-28 h-28 rounded-full bg-gradient-to-br from-purple-500 to-orange-400 p-1 glow">
          <img id="creator-photo" class="w-full h-full rounded-full object-cover hidden" alt="creator photo">
          <div id="creator-fallback" class="w-full h-full rounded-full bg-[#1a1a2e] flex items-center justify-center">
            <i data-lucide="flame" class="text-orange-500 w-12 h-12"></i>
          </div>
        </div>
        <div id="rank-badge" class="absolute -top-1 -right-1 bg-amber-400 text-black text-xs font-black px-2 py-0.5 rounded-full hidden"></div>
      </div>

      <h1 id="creator-name" class="text-2xl font-extrabold text-white mb-1"></h1>
      <p id="creator-bio" class="text-sm text-slate-400 leading-relaxed max-w-xs mx-auto mt-3"></p>

      <!-- SNS links -->
      <div id="sns-links" class="flex flex-wrap justify-center gap-2 mt-4"></div>
    </div>

    <!-- Stats -->
    <div id="stats-row" class="grid grid-cols-2 gap-3 mb-8 hidden">
      <div class="bg-white/5 border border-white/10 rounded-2xl p-3 text-center">
        <div id="stat-total" class="text-xl font-black text-amber-400">—</div>
        <div class="text-xs text-slate-500 mt-0.5">Total ¥</div>
      </div>
      <div class="bg-white/5 border border-white/10 rounded-2xl p-3 text-center">
        <div id="stat-supporters" class="text-xl font-black text-purple-400">—</div>
        <div class="text-xs text-slate-500 mt-0.5">Supporters</div>
      </div>
    </div>

    <!-- QR -->
    <div class="bg-white/[0.04] border border-white/10 rounded-3xl p-6 mb-5 text-center">
      <p class="text-xs text-slate-500 uppercase tracking-widest mb-4 font-bold">Scan to Support</p>
      <div class="float inline-block mb-4">
        <div class="bg-white p-3 rounded-2xl shadow-2xl inline-block relative">
          <div id="qr-container"></div>
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="bg-[#2d2d2d] rounded-xl p-1.5 shadow-lg">
              <img src="https://oyajibuki.github.io/OshiPay/favicon.png?v=2" class="w-7 h-7" alt="">
            </div>
          </div>
        </div>
      </div>
      <p class="text-xs text-slate-500">No app needed · Works worldwide 🌍</p>
    </div>

    <!-- CTA -->
    <a id="support-btn" href="#"
      class="block w-full py-4 bg-gradient-to-r from-purple-600 to-orange-500 rounded-full text-white font-bold text-center text-lg hover:opacity-90 transition-opacity mb-3">
      💜 Support
    </a>

    <!-- Share -->
    <button onclick="shareOrCopy()"
      class="w-full py-3 border border-white/10 rounded-full text-slate-400 text-sm font-medium hover:bg-white/5 transition-colors flex items-center justify-center gap-2">
      <i data-lucide="share-2" class="w-4 h-4"></i>
      Share this page
    </button>

    <!-- Language switch -->
    <div class="text-center mt-4">
      <a id="ja-link" href="#" class="text-xs text-slate-600 hover:text-slate-400 transition-colors">🇯🇵 日本語</a>
    </div>

    <!-- Message wall -->
    <div id="message-wall" class="mt-8 hidden">
      <h2 class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-4">Recent Support 💬</h2>
      <div id="message-list" class="space-y-3"></div>
    </div>

  </main>

  <script>
    lucide.createIcons();

    const { createClient } = supabase;
    const db = createClient(
      'https://zjygwjymbtskirycwptb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqeWd3anltYnRza2lyeWN3cHRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDQxMzksImV4cCI6MjA4ODM4MDEzOX0.U826zOvifFS2BHcs7OlMd6xHL1IXC6w5KZ7Kn7T-3wY'
    );

    const BASE_APP = 'https://oshipay2jp.streamlit.app';

    // Show edit button if this creator is logged in
    const savedAcct = localStorage.getItem('oshipay_acct') || '';

    async function loadCreator() {
      const id = new URLSearchParams(location.search).get('id') || '';
      if (!id) { showError('No creator ID specified.'); return; }

      const { data: creator, error } = await db
        .from('creators')
        .select('*')
        .or(`slug.eq.${id},acct_id.eq.${id}`)
        .single();

      if (error || !creator) { showError('Creator not found.'); return; }

      renderProfile(creator);

      // Stats
      const { data: supports } = await db
        .from('supports')
        .select('amount, supporter_id, message, created_at')
        .eq('creator_acct', creator.acct_id)
        .order('created_at', { ascending: false });

      if (supports && supports.length > 0) {
        const total   = supports.reduce((s, r) => s + r.amount, 0);
        const unique  = new Set(supports.map(r => r.supporter_id).filter(Boolean)).size;
        document.getElementById('stats-row').classList.remove('hidden');
        document.getElementById('stat-total').textContent      = `¥${total.toLocaleString()}`;
        document.getElementById('stat-supporters').textContent = unique || supports.length;
        const withMsg = supports.filter(s => s.message).slice(0, 5);
        if (withMsg.length > 0) renderMessages(withMsg);
      }
    }

    function renderProfile(c) {
      const name = c.display_name || c.name || c.acct_id;
      document.getElementById('creator-name').textContent = name;
      document.title = `${name} | OshiPay`;

      // Language switch link
      const slug = c.slug || c.acct_id;
      document.getElementById('ja-link').href = `../creator.html?id=${slug}`;

      // Show edit button if this creator is logged in
      if (savedAcct && savedAcct === c.acct_id) {
        const editBtn = document.getElementById('edit-btn');
        editBtn.href = `${BASE_APP}/?page=dashboard&acct=${c.acct_id}`;
        editBtn.classList.remove('hidden');
      }

      // Photo
      if (c.photo_url) {
        const img = document.getElementById('creator-photo');
        img.src = c.photo_url;
        img.classList.remove('hidden');
        document.getElementById('creator-fallback').classList.add('hidden');
      }

      // Bio (full, up to 500 chars)
      if (c.bio) document.getElementById('creator-bio').textContent = c.bio;

      // SNS links from sns_links JSONB
      const snsContainer = document.getElementById('sns-links');
      const sns = (typeof c.sns_links === 'string') ? JSON.parse(c.sns_links || '{}') : (c.sns_links || {});
      const snsDefs = [
        { key: 'x',         title: 'X',
          svg: `<svg viewBox="0 0 24 24" width="15" height="15" fill="#94a3b8"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>` },
        { key: 'instagram', title: 'Instagram',
          svg: `<svg viewBox="0 0 24 24" width="15" height="15" fill="#94a3b8"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>` },
        { key: 'youtube',   title: 'YouTube',
          svg: `<svg viewBox="0 0 24 24" width="15" height="15" fill="#94a3b8"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>` },
        { key: 'tiktok',    title: 'TikTok',
          svg: `<svg viewBox="0 0 24 24" width="15" height="15" fill="#94a3b8"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.94a8.27 8.27 0 004.83 1.55V7.04a4.85 4.85 0 01-1.06-.35z"/></svg>` },
        { key: 'note',      title: 'note',
          svg: `<svg viewBox="0 0 24 24" width="15" height="15"><text x="12" y="18" text-anchor="middle" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#94a3b8">n</text></svg>` },
        { key: 'facebook',  title: 'Facebook',
          svg: `<svg viewBox="0 0 24 24" width="15" height="15" fill="#94a3b8"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>` },
        { key: 'line',      title: 'LINE',
          svg: `<svg viewBox="0 0 24 24" width="15" height="15" fill="#94a3b8"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>` },
      ];
      snsDefs.forEach(({ key, title, svg }) => {
        const url = sns[key] || c[`${key}_url`] || '';
        if (!url) return;
        const a = document.createElement('a');
        a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.title = title;
        a.className = 'bg-white/[0.06] border border-white/10 w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/[0.12] transition-colors';
        a.innerHTML = svg;
        snsContainer.appendChild(a);
      });

      // Support button & QR
      const supportUrl = `${BASE_APP}/?page=support&user=${encodeURIComponent(c.acct_id)}&acct=${encodeURIComponent(c.acct_id)}&name=${encodeURIComponent(name)}`;
      const btn = document.getElementById('support-btn');
      btn.href = supportUrl;
      btn.textContent = `💜 Support ${name.split('｜')[0].split('|')[0].trim()}`;

      const canvas = document.createElement('canvas');
      document.getElementById('qr-container').appendChild(canvas);
      QRCode.toCanvas(canvas, supportUrl, { width: 200, margin: 2 });
    }

    function renderMessages(messages) {
      document.getElementById('message-wall').classList.remove('hidden');
      const list = document.getElementById('message-list');
      messages.forEach(m => {
        const div = document.createElement('div');
        div.className = 'bg-white/5 border border-white/10 rounded-2xl px-4 py-3 text-sm text-slate-300';
        div.textContent = `💬 ${m.message}`;
        list.appendChild(div);
      });
    }

    function showError(msg) {
      document.getElementById('creator-name').textContent = msg;
    }

    function shareOrCopy() {
      if (navigator.share) {
        navigator.share({ title: document.title, url: location.href });
      } else {
        navigator.clipboard.writeText(location.href).then(() => alert('Link copied!'));
      }
    }

    loadCreator();
  </script>
</body>
</html>
