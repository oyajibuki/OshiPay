<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OshiPay - 応援ページへ移動中...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      color: #f0f0f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; text-align: center;
    }
    .logo {
      font-size: 36px; font-weight: 900;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(139,92,246,0.2);
      border-top-color: #8b5cf6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 14px; color: rgba(240,240,245,0.55); }
  </style>
  <script>
    (function () {
      var path = window.location.pathname;
      var uMatch = path.match(/^\/u\/([^\/]+)\/?$/);
      if (uMatch) {
        var slug = uMatch[1];
        window.location.replace(
          'https://oshipay.streamlit.app/?page=support&creator=' + encodeURIComponent(slug)
        );
      } else {
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body>
  <div>
    <div class="logo">OshiPay</div>
    <div class="spinner"></div>
    <div class="msg">応援ページへ移動しています...</div>
  </div>
</body>
</html>
